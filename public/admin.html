<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        table {
            margin: auto;
            width: 80%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid black;
        }

        th {
            background: black;
            color: white;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>📊 Students List</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="data"></tbody>
    </table>

    <script>
    fetch("/students", {
        headers: {
            "Authorization": localStorage.getItem("token")
        }
    })
            .then(res => res.json())
            .then(data => {
                let output = "";
                data.forEach(student => {
                    output += `
        <tr>
            <td>${student.name}</td>
            <td>${student.phone}</td>
            <td>${student.course}</td>
            <td>
                <button onclick="editStudent('${student._id}')">Edit</button>
                <button onclick="deleteStudent('${student._id}')">Delete</button>
            </td>
        </tr>`;
                });
                document.getElementById("data").innerHTML = output;
            });

        // ✏️ Edit
        function editStudent(id) {
            const name = prompt("Enter new name");
            const phone = prompt("Enter new phone");

            fetch("/update/" + id, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name, phone })
            }).then(() => {
                alert("Updated ✅");
                location.reload();
            });
        }

        // ❌ Delete
        function deleteStudent(id) {
            fetch("/delete/" + id, { method: "DELETE" })
                .then(() => {
                    alert("Deleted ❌");
                    location.reload();
                });
        }

    </script>

</body>

</html>
