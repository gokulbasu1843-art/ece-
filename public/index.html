<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Computer Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <h1>ECE Computer Center</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#courses">Courses</a>
        <a href="#register">Register</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    <h2>Learn Computer Skills Easily 💻</h2>
    <p>ADCA | DCA | Tally | Excel | Photoshop</p>
    <a href="#register"><button>Enroll Now</button></a>
</section>

<!-- Courses -->
<section id="courses">
    <h2>Our Courses</h2>
    <div class="course-box">
        <div class="card">ADCA</div>
        <div class="card">DCA</div>
        <div class="card">Tally</div>
        <div class="card">Excel</div>
    </div>
</section>

<!-- Registration Form -->
<section id="register">
    <h2>Register Now</h2>

    <form id="form">
        <input type="text" id="name" placeholder="Your Name" required><br><br>
        <input type="text" id="phone" placeholder="Phone Number" required><br><br>

        <select id="course">
            <option>ADCA</option>
            <option>DCA</option>
            <option>Tally</option>
            <option>Excel</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>
</section>

<!-- Contact -->
<section id="contact">
    <h2>Contact Us</h2>
    <p>📍 Kalpani Bazar, Assam</p>
    <p>📞 8453670810/6000181843</p>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 ECE Computer Center</p>
</footer>

<script src="script.js"></script>
</body>
</html>
